<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Can Soler — Control Horari</title>
    
    <!-- CONFIGURACIÓ NATIVA IPHONE (iOS PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Can Soler">
    
    <style>
        :root {
            --bg-system: #f6f1eb; 
            --bg-card: #ffffff;
            --text-main: #2a1b15; 
            --text-muted: #7c685c; 
            --separator: #f1e8de;
            --input-bg: #faf7f2;
            --input-border: #dfd5c6;
            --gold: #b38b4d; 
            
            --soler-gradient: linear-gradient(135deg, #422312, #80593f, #b38b4d);
            --soler-glow: linear-gradient(90deg, #2a1b15, #6b4c35, #b38b4d);
            
            --cal-worked-bg: #f9f2e2; 
            --cal-worked-text: #664614;
            --cal-worked-border: #e6d3af;
            
            --cal-rest-bg: #e9e2d7; 
            --cal-rest-text: #4e453c;
            --cal-rest-border: #d4c8b8;
            
            --cal-missing-bg: #ffffff;
            --cal-missing-border: #a39382; 
            --shadow-opacity: 0.05;
        }

        body.dark-mode {
            --bg-system: #130d0b; 
            --bg-card: #1c1412;
            --text-main: #f3ece4; 
            --text-muted: #9e8a7d; 
            --separator: #281d1a;
            --input-bg: #160e0d;
            --input-border: #3b2c28;
            --gold: #d4af37;
            
            --soler-glow: linear-gradient(90deg, #f3ece4, #cca47c, #b38b4d);
            
            --cal-worked-bg: #362615; 
            --cal-worked-text: #fdf5e2;
            --cal-worked-border: #573a1c;
            
            --cal-rest-bg: #261d1b; 
            --cal-rest-text: #9e8a7d;
            --cal-rest-border: #362927;
            
            --cal-missing-bg: #18100f;
            --cal-missing-border: #5c4a45; 
            --shadow-opacity: 0.25;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, .brand-font {
            font-family: "Georgia", "Playfair Display", serif;
        }

        body {
            background-color: var(--bg-system);
            color: var(--text-main);
            padding: calc(16px + env(safe-area-inset-top)) 14px calc(30px + env(safe-area-inset-bottom)) 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(at 0% 0%, rgba(179, 139, 77, 0.15) 0px, transparent 60%),
                        radial-gradient(at 100% 100%, rgba(66, 35, 18, 0.15) 0px, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        .app-container {
            width: 100%;
            max-width: 390px; 
            display: flex;
            flex-direction: column;
            gap: 24px; 
        }

        .brand-header-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            padding: 6px 0;
        }

        .brand-logo-svg {
            width: 65px;
            height: 65px;
            margin-bottom: 8px;
            fill: none;
            stroke: var(--gold);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .brand-header-block h1 {
            font-size: 2.1rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text-main);
            line-height: 1.1;
        }

        .brand-location {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            font-weight: 700;
            margin-top: 2px;
        }

        .brand-divider {
            width: 35px;
            height: 1px;
            background: var(--gold);
            margin: 8px 0;
            opacity: 0.4;
        }

        .brand-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .top-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .theme-toggle-btn {
            background: var(--bg-card);
            border: 1px solid var(--input-border);
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }
        .theme-toggle-btn:active { transform: scale(0.9); }

        .contract-badge {
            font-size: 0.75rem;
            color: var(--text-main);
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 800;
            border: 1px solid var(--input-border);
        }

        .ios-group {
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--input-border);
            box-shadow: 0 8px 25px rgba(62, 39, 35, var(--shadow-opacity));
        }

        .ios-group-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-main);
            margin-left: 4px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ios-group-title::before {
            content: "•";
            color: var(--gold);
            font-size: 1.2rem;
            display: inline-block;
            line-height: 0;
        }

        .ios-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 16px;
            border-bottom: 1px solid var(--separator);
        }

        input[type="date"], input[type="time"], input[type="number"] {
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 16px; 
            color: var(--text-main);
            text-align: right;
            font-weight: 700;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="date"]:focus, input[type="time"]:focus, input[type="number"]:focus {
            border-color: var(--gold);
            background: var(--bg-card);
        }
        
        input[type="number"] { width: 100px; }

        input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 50px; height: 28px;
            background-color: var(--input-border);
            border-radius: 14px;
            position: relative;
            outline: none;
        }

        input[type="checkbox"]:checked { background: var(--soler-gradient); }

        input[type="checkbox"]::after {
            content: "";
            position: absolute;
            width: 24px; height: 24px;
            border-radius: 50%;
            background-color: white;
            top: 2px; left: 2px;
            transition: transform 0.2s;
        }

        input[type="checkbox"]:checked::after { transform: translateX(22px); }

        .btn-secondary-ios {
            background: none; border: none;
            color: var(--gold);
            font-size: 0.9rem; font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; gap: 4px;
        }

        #second-shift-container {
            border-top: 1px solid var(--separator);
            background: rgba(179, 139, 77, 0.02);
        }

        .shift-section-title {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            padding: 14px 16px 4px 16px;
            text-transform: uppercase;
        }

        .btn-soler {
            width: 100%;
            padding: 16px;
            background: var(--soler-gradient);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(66, 35, 18, 0.2);
            -webkit-appearance: none;
            transition: transform 0.1s;
        }
        .btn-soler:active { transform: scale(0.98); }

        .ios-balance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 18px 0;
            text-align: center;
        }

        .balance-item .lbl {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .balance-item .val { font-size: 1.6rem; font-weight: 800; }
        .wallet-value { font-size: 2rem; font-weight: 900; background: var(--soler-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .progress-bar-container { padding: 0 16px 16px 16px; }
        .progress-track { width: 100%; height: 6px; background: var(--separator); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--soler-gradient); transition: width 0.4s ease-out; }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2px 10px 2px;
        }

        .calendar-header h2 { font-size: 1.2rem; font-weight: 800; }

        .cal-nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--input-border);
            font-size: 1rem;
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px; 
            padding: 12px;
            background: #ffffff;
        }
        body.dark-mode .calendar-grid { background: var(--bg-card); }

        .weekday {
            text-align: center;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
        }

        .day-cell {
            aspect-ratio: 1;
            width: 100%;
            min-height: 46px;
            border-radius: 12px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            position: relative;
            background-color: var(--cal-missing-bg);
            border: 2px dashed var(--cal-missing-border);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .day-cell:active { transform: scale(0.9); }

        .day-cell.worked { background-color: var(--cal-worked-bg); border: 1px solid var(--cal-worked-border); color: var(--cal-worked-text); }
        .day-cell.rest { background-color: var(--cal-rest-bg); border: 1px solid var(--cal-rest-border); color: var(--cal-rest-text); }
        .day-cell .hours-label { font-size: 0.55rem; font-weight: 800; position: absolute; bottom: 3px; text-transform: uppercase; }
        
        .day-cell.current-selection {
            background: var(--soler-gradient) !important;
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 4px 12px rgba(96, 56, 19, 0.35);
        }
        .day-cell.current-selection .hours-label { color: #ffffff !important; }
        .day-cell.empty { background: transparent !important; border: none !important; box-shadow: none !important; }

        .calendar-legend { display: flex; justify-content: center; gap: 14px; padding: 0 12px 14px 12px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); background: #ffffff; }
        body.dark-mode .calendar-legend { background: var(--bg-card); }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

        .backup-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 6px;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .btn-link-backup {
            background: none; border: none;
            color: var(--text-muted);
            font-size: 0.8rem; font-weight: 700;
            cursor: pointer;
        }

        .ios-toast {
            display: none;
            position: fixed;
            top: calc(16px + env(safe-area-inset-top)); 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(42, 27, 21, 0.96);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 0.9rem; font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 9999;
        }

        @media print {
            body { background: #ffffff !important; color: #000000 !important; padding: 0 !important; }
            body::before, #editor-section, .backup-footer, .cal-nav-btn, .theme-toggle-btn, .calendar-legend, #btn-pdf-trigger { display: none !important; }
            .app-container { max-width: 100% !important; width: 100% !important; gap: 20px !important; }
            .ios-group { border: 1px solid #2a1b15 !important; box-shadow: none !important; background: #ffffff !important; border-radius: 12px !important; }
            .day-cell { border: 1px solid #cbd5e1 !important; color: #0f172a !important; background: #ffffff !important; box-shadow: none !important; border-radius: 6px !important; }
            .day-cell.worked { background-color: #f8fafc !important; }
            .day-cell.rest { background-color: #f1f5f9 !important; color: #475569 !important; }
            .day-cell.current-selection { background: transparent !important; color: #000000 !important; border: 2px solid #000000 !important;}
            .wallet-value { background: none !important; -webkit-text-fill-color: initial !important; color: #000000 !important; }
        }
    </style>
</head>
<body>

<div id="toast" class="ios-toast">✓ Registrat a Can Soler</div>

<div class="app-container">
    
    <!-- HEADER BRANDING -->
    <div class="brand-header-block">
        <svg class="brand-logo-svg" viewBox="0 0 100 100">
            <path d="M35 25 v25 c0 8 5 12 10 12 v18 h10 v-18 c5 0 10-4 10-12 v-25 M40 25 v12 M45 25 v12 M50 25 v12 M55 25 v12 M60 25 v12" />
            <path d="M65 25 c2 0 4 5 4 15 c0 8-2 15-4 15 v25 h-5 v-25" />
            <circle cx="50" cy="50" r="46" stroke-dasharray="4 4" opacity="0.3"/>
        </svg>
        <h1>CAN SOLER</h1>
        <div class="brand-location">Sant Celoni</div>
        <div class="brand-divider"></div>
        <div class="brand-subtitle">Registre Horari Laboral</div>
    </div>

    <!-- CONTROL ACCIONS -->
    <div class="top-action-bar">
        <button type="button" class="theme-toggle-btn" id="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
        <div class="contract-badge">Base: 30h setmanals</div>
    </div>

    <!-- 1. CALENDARI -->
    <div>
        <div class="calendar-header">
            <h2 id="calendar-month-year">Juny 2026</h2>
            <div style="display:flex; gap:6px; align-items:center;">
                <button type="button" class="cal-nav-btn" id="btn-pdf-trigger" onclick="exportToPDF()" style="font-size:0.8rem; padding: 5px 10px; border-color:var(--gold); color:var(--gold);">📄 PDF</button>
                <button class="cal-nav-btn" onclick="changeMonth(-1)">&lt;</button>
                <button class="cal-nav-btn" onclick="changeMonth(1)">&gt;</button>
            </div>
        </div>
        
        <div class="ios-group">
            <div class="calendar-grid" id="calendar-grid"></div>
            <div class="calendar-legend">
                <div class="legend-item"><div class="legend-dot" style="background: var(--cal-worked-bg); border: 1px solid var(--cal-worked-border);"></div>Fet</div>
                <div class="legend-item"><div class="legend-dot" style="background: var(--cal-rest-bg); border: 1px solid var(--cal-rest-border);"></div>Descans</div>
                <div class="legend-item"><div class="legend-dot" style="border: 2px dashed var(--cal-missing-border); background: var(--bg-card)"></div>Buit</div>
            </div>
        </div>
    </div>

    <!-- 2. HISTORIAL COMPTABLE ACUMULAT -->
    <div>
        <div class="ios-group-title">Historial de Comptes Generals</div>
        <div class="ios-group">
            <div class="ios-balance-grid">
                <div class="balance-item">
                    <span class="lbl">Hores Extres Totals</span>
                    <span class="val" id="global-accumulated-hours" style="color: var(--gold);">0h</span>
                </div>
                <div class="balance-item">
                    <span class="lbl">Falta per pagar</span>
                    <span class="wallet-value" id="global-pending-money">0.00€</span>
                </div>
            </div>
            <div class="ios-row">
                <label style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted);">M'han pagat (€)</label>
                <input type="number" id="input-global-paid" step="any" placeholder="0.00">
            </div>
            <div class="ios-row">
                <label style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted);">Retorn d'hores (h)</label>
                <input type="number" id="input-global-returned" step="any" placeholder="0.0">
            </div>
        </div>
    </div>

    <!-- 3. BALANÇ SETMANAL -->
    <div>
        <div class="ios-group-title">Balanç d'aquesta Setmana</div>
        <div class="ios-group">
            <div class="ios-balance-grid">
                <div class="balance-item">
                    <span class="lbl">Hores Fetes</span>
                    <span class="val" id="total-hours">0h</span>
                </div>
                <div class="balance-item">
                    <span class="lbl" id="balance-label">Estat</span>
                    <span class="val" id="balance-value">-</span>
                </div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-track">
                    <div id="week-progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. FORMULARI REGISTRE -->
    <div id="editor-section">
        <div class="ios-group-title" id="form-title">Registrar Horari</div>
        <div class="ios-group">
            <div class="ios-row">
                <label style="font-weight: 600; font-size:0.95rem;">Data de treball</label>
                <input type="date" id="date">
            </div>
            <div class="ios-row">
                <label style="font-weight: 600; font-size:0.95rem;">Marcar com a descans</label>
                <input type="checkbox" id="rest_day">
            </div>
            <div id="shifts-container">
                <div class="ios-row">
                    <label style="font-weight: 600; font-size:0.95rem;">Entrada</label>
                    <input type="time" id="start_1">
                </div>
                <div class="ios-row">
                    <label style="font-weight: 600; font-size:0.95rem;">Sortida</label>
                    <input type="time" id="end_1">
                </div>
                <div class="ios-row" id="split-trigger-row" style="background: rgba(179,139,77,0.02);">
                    <label style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">Tipus de jornada</label>
                    <button type="button" class="btn-secondary-ios" id="btn-add-split">+ Afegir torn partit</button>
                </div>
                <div id="second-shift-container" style="display: none;">
                    <div class="shift-section-title">Segona Tanda</div>
                    <div class="ios-row">
                        <label style="color: var(--text-muted); font-size:0.9rem;">Entrada 2</label>
                        <input type="time" id="start_2">
                    </div>
                    <div class="ios-row">
                        <label style="color: var(--text-muted); font-size:0.9rem;">Sortida 2</label>
                        <input type="time" id="end_2">
                    </div>
                </div>
            </div>
        </div>
        <button type="button" class="btn-soler" id="btn-save-trigger" style="margin-top: 14px;">Desar registre</button>
    </div>

    <!-- 5. BACKUP -->
    <footer class="backup-footer">
        <button type="button" class="btn-link-backup" onclick="exportData()">📥 Còpia</button>
        <button type="button" class="btn-link-backup" onclick="importData()">📤 Carregar</button>
    </footer>

</div>

<script>
    // 🚀 INJECTOR AUTOMÀTIC D'ICONA PREMIUM EN FORMAT PNG COMPATIBLE AMB IPHONE
    function generateAppleIcon() {
        const canvas = document.createElement('canvas');
        canvas.width = 180;
        canvas.height = 180;
        const ctx = canvas.getContext('2d');

        // 1. Fons sòlid Marró Cafè Noble de Can Soler
        ctx.fillStyle = '#2a1b15';
        ctx.fillRect(0, 0, 180, 180);

        // 2. Marc exterior circular d'alta gastronomia (Or Vell)
        ctx.strokeStyle = '#b38b4d';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(90, 90, 76, 0, Math.PI * 2);
        ctx.stroke();

        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(90, 90, 70, 0, Math.PI * 2);
        ctx.stroke();

        // 3. Tipografia de luxe tipus menú prèmium per al Monograma "CS"
        ctx.fillStyle = '#b38b4d';
        ctx.font = 'bold 56px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('CS', 90, 80);

        // 4. Detall de sublinia i coberts minimalistes a sota
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(55, 122);
        ctx.lineTo(125, 122);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(90, 122, 4, 0, Math.PI * 2);
        ctx.fill();

        // 5. Injectar com a l'apple-touch-icon oficial en format PNG d'alta qualitat
        const link = document.createElement('link');
        link.rel = 'apple-touch-icon';
        link.href = canvas.toDataURL('image/png');
        document.head.appendChild(link);
        
        // Icona estàndard de navegador de seguretat
        const favicon = document.createElement('link');
        favicon.rel = 'icon';
        favicon.type = 'image/png';
        favicon.href = canvas.toDataURL('image/png');
        document.head.appendChild(favicon);
    }
    
    // Execució immediata abans que l'usuari premi "Afegir a la pantalla d'inici"
    generateAppleIcon();

    let storageAvailable = true;
    try {
        localStorage.setItem('__test_soler_v6__', '1');
        localStorage.removeItem('__test_soler_v6__');
    } catch (e) {
        storageAvailable = false;
    }

    function getLocalDateString(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    let workData = {};
    let globalPaid = 0;
    let globalReturnedHours = 0;
    let hasSplitActive = false; 
    let activeTheme = 'light';

    if (storageAvailable) {
        workData = JSON.parse(localStorage.getItem('work_hours_soler_v6')) || {};
        globalPaid = parseFloat(localStorage.getItem('global_paid_v6')) || 0;
        globalReturnedHours = parseFloat(localStorage.getItem('global_returned_hours_v6')) || 0;
        activeTheme = localStorage.getItem('theme_soler_v6') || 'light';
    }

    if (activeTheme === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-toggle-btn').innerText = '☀️';
    }

    let currentDisplayDate = new Date(2026, 5, 13); 

    const dateInput = document.getElementById('date');
    const restDayCheckbox = document.getElementById('rest_day');
    const shiftsContainer = document.getElementById('shifts-container');
    const secondShiftContainer = document.getElementById('second-shift-container');
    const btnAddSplit = document.getElementById('btn-add-split');
    
    const calendarGrid = document.getElementById('calendar-grid');
    const calendarTitle = document.getElementById('calendar-month-year');
    const toast = document.getElementById('toast');
    const saveButton = document.getElementById('btn-save-trigger');
    
    const inputGlobalPaid = document.getElementById('input-global-paid');
    const inputGlobalReturned = document.getElementById('input-global-returned');

    inputGlobalPaid.value = globalPaid > 0 ? globalPaid : "";
    inputGlobalReturned.value = globalReturnedHours > 0 ? globalReturnedHours : "";

    dateInput.value = getLocalDateString(currentDisplayDate);

    function toggleTheme() {
        if (document.body.classList.contains('dark-mode')) {
            document.body.classList.remove('dark-mode');
            document.getElementById('theme-toggle-btn').innerText = '🌙';
            activeTheme = 'light';
        } else {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-toggle-btn').innerText = '☀️';
            activeTheme = 'dark';
        }
        if (storageAvailable) localStorage.setItem('theme_soler_v6', activeTheme);
    }

    function exportToPDF() { window.print(); }

    btnAddSplit.addEventListener('click', function() {
        if (!hasSplitActive) { showSecondShiftFields(); } else { hideSecondShiftFields(); cleanSecondShiftFields(); }
    });

    function showSecondShiftFields() {
        secondShiftContainer.style.display = 'block';
        btnAddSplit.innerText = "✕ Eliminar partit";
        btnAddSplit.style.color = "#c23a3a";
        hasSplitActive = true;
    }

    function hideSecondShiftFields() {
        secondShiftContainer.style.display = 'none';
        btnAddSplit.innerText = "+ Afegir torn partit";
        btnAddSplit.style.color = "var(--gold)";
        hasSplitActive = false;
    }

    function cleanSecondShiftFields() {
        document.getElementById('start_2').value = "";
        document.getElementById('end_2').value = "";
    }

    restDayCheckbox.addEventListener('change', function() {
        if (this.checked) { shiftsContainer.style.display = 'none'; } else { shiftsContainer.style.display = 'block'; }
    });

    function calculateShiftHours(start, end) {
        if (!start || !end) return 0;
        let [hStart, mStart] = start.split(':').map(Number);
        let [hEnd, mEnd] = end.split(':').map(Number);
        let startMinutes = hStart * 60 + mStart;
        let endMinutes = hEnd * 60 + mEnd;
        if (endMinutes < startMinutes) endMinutes += 24 * 60; 
        return (endMinutes - startMinutes) / 60;
    }

    function getDayTotalHours(dayData) {
        if (!dayData || dayData.restDay) return 0;
        return calculateShiftHours(dayData.s1_in, dayData.s1_out) + calculateShiftHours(dayData.s2_in, dayData.s2_out);
    }

    function getMondayKey(dateStr) {
        const parts = dateStr.split('-');
        let d = new Date(parts[0], parts[1] - 1, parts[2]);
        let day = d.getDay();
        let diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return getLocalDateString(new Date(parts[0], parts[1] - 1, diff));
    }

    function getWeekRange(dateStr) {
        const parts = dateStr.split('-');
        let date = new Date(parts[0], parts[1] - 1, parts[2]);
        let day = date.getDay();
        let diff = date.getDate() - day + (day === 0 ? -6 : 1);
        let monday = new Date(parts[0], parts[1] - 1, diff);
        let weekDays = [];
        for (let i = 0; i < 7; i++) {
            let d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
            weekDays.push(getLocalDateString(d));
        }
        return weekDays;
    }

    function updateGlobalAccounting() {
        let weeklyGroups = {};
        Object.keys(workData).forEach(dateStr => {
            let monKey = getMondayKey(dateStr);
            let hours = getDayTotalHours(workData[dateStr]);
            weeklyGroups[monKey] = (weeklyGroups[monKey] || 0) + hours;
        });

        let totalExtraHoursGenerated = 0;
        Object.keys(weeklyGroups).forEach(monKey => {
            if (weeklyGroups[monKey] > 30) { totalExtraHoursGenerated += (weeklyGroups[monKey] - 30); }
        });

        let totalMoneyEarned = totalExtraHoursGenerated * 12;
        let moneyDeductedByHours = globalReturnedHours * 12;
        let finalPendingMoney = totalMoneyEarned - globalPaid - moneyDeductedByHours;

        if (finalPendingMoney < 0) finalPendingMoney = 0;

        document.getElementById('global-accumulated-hours').innerText = totalExtraHoursGenerated.toFixed(1) + "h";
        document.getElementById('global-pending-money').innerText = finalPendingMoney.toFixed(2) + "€";
    }

    function updateWeeklySummary() {
        const selectedDateStr = dateInput.value;
        const weekDays = getWeekRange(selectedDateStr);
        let totalHours = 0;
        weekDays.forEach(dateStr => {
            if (workData[dateStr]) totalHours += getDayTotalHours(workData[dateStr]);
        });

        document.getElementById('total-hours').innerText = totalHours.toFixed(1) + "h";
        const balanceLabel = document.getElementById('balance-label');
        const balanceValue = document.getElementById('balance-value');
        
        const progressFill = document.getElementById('week-progress-fill');
        let percentage = (totalHours / 30) * 100;
        if (percentage > 100) percentage = 100;
        progressFill.style.width = percentage + "%";

        if (totalHours >= 30) {
            let extraHours = totalHours - 30;
            balanceLabel.innerText = "Extra Setmana";
            balanceValue.innerText = "+" + extraHours.toFixed(1) + "h";
            balanceValue.style.color = "var(--cal-worked-text)";
        } else {
            let owedHours = 30 - totalHours;
            balanceLabel.innerText = "Mancant";
            balanceValue.innerText = "-" + owedHours.toFixed(1) + "h";
            balanceValue.style.color = "var(--text-main)";
        }
    }

    function renderCalendar() {
        calendarGrid.innerHTML = '';
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        const monthNames = ["Gener", "Febrer", "Març", "Abril", "Maig", "Juny", "Juliol", "Agost", "Setembre", "Octubre", "Novembre", "Desembre"];
        calendarTitle.innerText = `${monthNames[month]} ${year}`;
        
        ['Dl', 'Dt', 'Dc', 'Dj', 'Dv', 'Ds', 'Dg'].forEach(d => {
            const el = document.createElement('div'); el.className = 'weekday'; el.innerText = d; calendarGrid.appendChild(el);
        });
        
        let firstDayIndex = new Date(year, month, 1).getDay();
        firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 
        const totalDays = new Date(year, month + 1, 0).getDate();
        
        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div'); emptyCell.className = 'day-cell empty'; calendarGrid.appendChild(emptyCell);
        }
        
        for (let day = 1; day <= totalDays; day++) {
            const cellDate = new Date(year, month, day);
            const dateStr = getLocalDateString(cellDate);
            const cell = document.createElement('div'); cell.className = 'day-cell';
            
            if (dateStr === dateInput.value) cell.classList.add('current-selection');
            cell.innerText = day;
            
            if (workData[dateStr]) {
                if (workData[dateStr].restDay) {
                    cell.classList.add('rest');
                    const label = document.createElement('div'); label.className = 'hours-label'; label.innerText = "Desc"; cell.appendChild(label);
                } else {
                    let totalH = getDayTotalHours(workData[dateStr]);
                    if (totalH > 0) {
                        cell.classList.add('worked');
                        const label = document.createElement('div'); label.className = 'hours-label'; label.innerText = totalH.toFixed(1) + "h"; cell.appendChild(label);
                    }
                }
            } 
            
            cell.addEventListener('click', () => {
                dateInput.value = dateStr;
                loadDateIntoForm(dateStr);
                renderCalendar(); 
                document.getElementById('editor-section').scrollIntoView({ behavior: 'smooth' });
            });
            calendarGrid.appendChild(cell);
        }
    }

    function loadDateIntoForm(dateStr) {
        hideSecondShiftFields();
        if (workData[dateStr]) {
            const d = workData[dateStr];
            restDayCheckbox.checked = d.restDay;
            document.getElementById('start_1').value = d.s1_in || "";
            document.getElementById('end_1').value = d.s1_out || "";
            document.getElementById('start_2').value = d.s2_in || "";
            document.getElementById('end_2').value = d.s2_out || "";
            if (d.s2_in || d.s2_out) { showSecondShiftFields(); }
        } else {
            restDayCheckbox.checked = false;
            document.getElementById('start_1').value = ""; document.getElementById('end_1').value = "";
            cleanSecondShiftFields();
        }
        restDayCheckbox.dispatchEvent(new Event('change'));
        updateWeeklySummary();
    }

    inputGlobalPaid.addEventListener('input', function(e) {
        globalPaid = parseFloat(e.target.value) || 0;
        if (storageAvailable) localStorage.setItem('global_paid_v6', globalPaid);
        updateGlobalAccounting();
    });

    inputGlobalReturned.addEventListener('input', function(e) {
        globalReturnedHours = parseFloat(e.target.value) || 0;
        if (storageAvailable) localStorage.setItem('global_returned_hours_v6', globalReturnedHours);
        updateGlobalAccounting();
    });

    dateInput.addEventListener('change', (e) => {
        const parts = e.target.value.split('-');
        currentDisplayDate = new Date(parts[0], parts[1] - 1, parts[2]);
        loadDateIntoForm(e.target.value);
        renderCalendar();
    });

    function changeMonth(direction) {
        currentDisplayDate.setMonth(currentDisplayDate.getMonth() + direction);
        renderCalendar();
    }

    saveButton.addEventListener('click', function() {
        const selectedDate = dateInput.value;
        if(!selectedDate) return;
        workData[selectedDate] = {
            restDay: restDayCheckbox.checked,
            s1_in: document.getElementById('start_1').value,
            s1_out: document.getElementById('end_1').value,
            s2_in: document.getElementById('start_2').value,
            s2_out: document.getElementById('end_2').value
        };
        if (storageAvailable) localStorage.setItem('work_hours_soler_v6', JSON.stringify(workData));
        renderCalendar(); updateWeeklySummary(); updateGlobalAccounting();
        toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2000);
    });

    function exportData() {
        let backup = { workData, globalPaid, globalReturnedHours };
        let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup));
        let downloadAnchor = document.createElement('a'); downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "BACKUP_CAN_SOLER.json");
        document.body.appendChild(downloadAnchor); downloadAnchor.click(); downloadAnchor.remove();
    }

    function importData() {
        let input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
        input.onchange = e => {
            let file = e.target.files[0]; let reader = new FileReader(); reader.readAsText(file, 'UTF-8');
            reader.onload = readerEvent => {
                try {
                    let content = JSON.parse(readerEvent.target.result);
                    if (content.workData) {
                        workData = content.workData; globalPaid = content.globalPaid || 0; globalReturnedHours = content.globalReturnedHours || 0;
                        if (storageAvailable) {
                            localStorage.setItem('work_hours_soler_v6', JSON.stringify(workData));
                            localStorage.setItem('global_paid_v6', globalPaid); 
                            localStorage.setItem('global_returned_hours_v6', globalReturnedHours);
                        }
                        inputGlobalPaid.value = globalPaid > 0 ? globalPaid : "";
                        inputGlobalReturned.value = globalReturnedHours > 0 ? globalReturnedHours : "";
                        loadDateIntoForm(dateInput.value); renderCalendar(); updateGlobalAccounting();
                    }
                } catch(err) { alert("Error: Fitxer invàlid."); }
            }
        }
        input.click();
    }

    loadDateIntoForm(dateInput.value);
    renderCalendar();
    updateGlobalAccounting();
</script>

</body>
</html>
